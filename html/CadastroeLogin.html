<!DOCTYPE html>
<html lang="pt-br">
<head>

<body class="comeco">
    

    <!-- Cadastros -->
 <section id="Cadastro" class="container">

    <h2>Cadastro</h2>


    <form id="formCadastro">
<div class="todosInputs">
      <input
      class="cadaUm"
        type="text"
        placeholder="Digite seu nome..." 
      ><br>

      <input
      class="cadaUm"
        type="email"
        placeholder="Digite seu e-mail..."
      ><br>

      <textarea
      class="cadaUm"
        placeholder="Digite sua senha..."

></textarea><br>
        <textarea
        class="cadaUm"
        placeholder="Confirme sua senha..."
      ></textarea><br>

     <div class="Botões">
      <button type="submit">
        Entrar
      </button>
       
      <button type="submit">
        Acesso administrativo
      </button>

      </div>

    </div>
<section>

    <!-- login -->
    <section id="login" class="tudologin">
        <h3>
            Login
        </h3>
        <form id="formlogin">
           <input type="email" placeholder="digite seu email..."><br>
            <input type="senha" placeholder="digite sua senha..."><br>
            <input type="confirme" placeholder="confirme sua senha..."><br>

            <button type="submit">Entrar</button>
            <button type="submit">Entrar como Administrador</button>

        </form>

    </section>

    <!-- login administrativo -->
    <section id="loginadm" class="tudologinadm">
        <h3>
            Login administrativo
        </h3>
        <form id="formloginadm">
           <input type="email" placeholder="digite seu email..."><br>
            <input type="senha" placeholder="digite sua senha..."><br>
            <input type="confirme" placeholder="confirme sua senha..."><br>

            <button type="submit">Entrar</button>
            <button type="submit">Entrar como Usuário</button>

        </form>

    </section>
